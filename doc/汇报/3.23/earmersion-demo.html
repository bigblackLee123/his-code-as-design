<script type="text/babel">

const LstI=p=><Ic {...p}><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></Ic>;

/* == Data == */
const CI={"心血管":[{c:"CI001",n:"严重心律失常"},{c:"CI007",n:"心血管疾病患者"}],"精神心理":[{c:"CI002",n:"严重抑郁患者"},{c:"CI003",n:"严重精神病性障碍"},{c:"CI004",n:"创伤后应激障碍"},{c:"CI008",n:"急性精神病状态"},{c:"CI011",n:"精神分裂症患者"}],"神经系统":[{c:"CI010",n:"癫痫患者"}],"感官":[{c:"CI006",n:"听力损失"},{c:"CI012",n:"耳鸣"}],"成瘾":[{c:"CI009",n:"物质滥用患者"}],"睡眠区通用":[{c:"CI005",n:"创伤患者"},{c:"CI013",n:"身体疼痛/疾病"}]};
const PJ=[
  {id:"p1",rg:"睡眠区",nm:"舒曼波",bpm:50,mood:"平静",eng:"深度镇静",mech:"舒曼波频段与大脑alpha波相似，促进放松",ci:["CI004","CI002","CI006","CI012","CI008","CI001"]},
  {id:"p2",rg:"睡眠区",nm:"海洋冥想",bpm:55,mood:"平静、接纳",eng:"平静放松",mech:"自然情境深度减压，全身体感放松",ci:["CI004","CI006","CI012","CI008","CI001"]},
  {id:"p3",rg:"睡眠区",nm:"体感音波",bpm:40,mood:"平静",eng:"深度镇静",mech:"清灵音符让精神世界从无序到有序",ci:["CI006","CI012","CI008","CI001"]},
  {id:"p4",rg:"情志区",nm:"森林冥想",bpm:55,mood:"放松",eng:"平静放松",mech:"自然情境深度减压",ci:["CI004","CI006","CI012","CI008","CI001"]},

  {id:"p6",rg:"情志区",nm:"alpha脑波音乐",bpm:50,mood:"平静",eng:"深度镇静",mech:"alpha波8-12Hz，放松专注缓解压力",ci:["CI003","CI002","CI006","CI012","CI008","CI001"]},
  {id:"p7",rg:"运动疗愈区",nm:"步态调整",bpm:80,mood:"积极",eng:"激活",mech:"音乐激活听觉-运动耦合，重建流畅步态",ci:["CI010","CI011","CI007","CI009","CI006","CI012","CI008","CI001"]},
  {id:"p8",rg:"运动疗愈区",nm:"老年认知律动呼吸操",bpm:80,mood:"积极",eng:"激活",mech:"节奏化呼吸练习和身体律动",ci:["CI010","CI011","CI009","CI006","CI012","CI008","CI001"]},
  {id:"p9",rg:"运动疗愈区",nm:"节奏模打操",bpm:80,mood:"积极",eng:"激活",mech:"听觉接收节奏信号，肢体精确复制",ci:["CI010","CI011","CI009","CI006","CI012","CI008","CI001"]},
];
const SC=[
  {id:"psqi",nm:"匹兹堡睡眠质量指数(PSQI)",ds:"评估近一个月睡眠质量，>7分提示差",qs:[
    {id:"q1",t:"通常几点上床睡觉？",o:[{l:"22:00前",s:0},{l:"22-23点",s:1},{l:"23-0点",s:2},{l:"0点后",s:3}]},
    {id:"q2",t:"需要多长时间入睡？",o:[{l:"≤15分钟",s:0},{l:"16-30分钟",s:1},{l:"31-60分钟",s:2},{l:">60分钟",s:3}]},
    {id:"q3",t:"睡眠效率如何？",o:[{l:">85%",s:0},{l:"75-84%",s:1},{l:"65-74%",s:2},{l:"<65%",s:3}]},
    {id:"q4",t:"是否使用催眠药物？",o:[{l:"无",s:0},{l:"每周<1次",s:1},{l:"每周1-2次",s:2},{l:"每周≥3次",s:3}]},
  ]},
  {id:"gad7",nm:"广泛性焦虑量表(GAD-7)",ds:"评估过去两周焦虑症状",qs:[
    {id:"g1",t:"感到紧张、焦虑或急切",o:[{l:"完全没有",s:0},{l:"好几天",s:1},{l:"一半以上",s:2},{l:"几乎每天",s:3}]},
    {id:"g2",t:"不能停止或控制担忧",o:[{l:"完全没有",s:0},{l:"好几天",s:1},{l:"一半以上",s:2},{l:"几乎每天",s:3}]},
    {id:"g3",t:"很难放松下来",o:[{l:"完全没有",s:0},{l:"好几天",s:1},{l:"一半以上",s:2},{l:"几乎每天",s:3}]},
    {id:"g4",t:"变得容易烦恼或易怒",o:[{l:"完全没有",s:0},{l:"好几天",s:1},{l:"一半以上",s:2},{l:"几乎每天",s:3}]},
  ]},
];
const WARNS=["患者出现头晕、恶心","患者情绪激动或哭泣不止","患者心率异常升高","患者主动要求停止"];
const KNOW=["《黄帝内经》素问·五藏生成","现代神经科学: RAS 步态耦合机制","耳界 3D 音频对 Alpha 波影响研究","帕金森非运动症状音乐干预 Meta 分析"];

/* == Mock AI == */
const mockAI=t=>new Promise(r=>{setTimeout(()=>{
  if(t==="diagnosis") r("## 智能分流建议\n\n**推荐区域：静区**\n\n### 分析依据\n1. 主诉：睡眠障碍+焦虑，非运动症状为主\n2. HRV偏低(35ms)：交感神经过度激活\n3. 帕金森初期：静止性震颤为主\n\n### 推荐音乐处方\n- **调式**：羽调式(A Minor)\n- **频率**：40Hz Gamma波引导\n- **BPM**：60-70\n- **时长**：25分钟");
  else if(t==="adverse") r("# 不良事件报告\n\n## 事件概述\n治疗过程中患者出现不适症状，已立即停止治疗。\n\n## 事件详情\n| 项目 | 内容 |\n|------|------|\n| 患者 | 李先生，65岁 |\n| 治疗项目 | 当前选定配方 |\n| 发生时间 | "+new Date().toLocaleString('zh-CN')+" |\n| 症状描述 | 由护士记录 |\n\n## 处置措施\n1. 立即停止音乐播放\n2. 监测生命体征\n3. 通知主治医生\n4. 记录不良事件至HIS系统\n\n## 后续建议\n- 24小时内随访\n- 调整治疗方案\n- 必要时转诊");
  else r("# 数字音乐治疗结诊报告\n\n## 一、诊断概述\n患者李先生，65岁，主诉入睡困难、手部震颤、焦虑。HRV 35ms，心率82BPM。\n\n## 二、禁忌症筛查\n经系统筛查，未发现绝对禁忌症。\n\n## 三、量表评估\n| 量表 | 得分 | 解读 |\n|------|------|------|\n| PSQI | 12/16 | 睡眠质量差 |\n| GAD-7 | 10/12 | 中度焦虑 |\n\n## 四、治疗方案\n- 干预区域：静区\n- 调式：羽调式\n- 频率：40Hz\n- 时长：25分钟\n\n## 五、效果评估\n| 指标 | 治疗前 | 治疗后 | 变化 |\n|------|--------|--------|------|\n| 心率 | 82 | 74 | ↓9.8% |\n| HRV | 35 | 48 | ↑37.1% |\n\n## 六、家庭康复建议\n1. 每日睡前聆听羽调式低频音乐15分钟\n2. 配合腹式呼吸训练\n3. 一周后复诊");
},1500);});

/* == Markdown == */
const rMD=text=>{
  if(!text)return null;const ls=text.split('\n'),es=[];let iT=false,tR=[];
  const fl=()=>{if(tR.length>0){es.push(<table key={`t${es.length}`} className="w-full text-sm border-collapse my-3"><thead><tr className="border-b-2 border-slate-300">{tR[0].map((c,i)=><th key={i} className="text-left p-2 font-bold text-slate-700">{c}</th>)}</tr></thead><tbody>{tR.slice(2).map((r,ri)=><tr key={ri} className="border-b border-slate-200">{r.map((c,ci)=><td key={ci} className="p-2 text-slate-600">{c}</td>)}</tr>)}</tbody></table>);tR=[];iT=false;}};
  ls.forEach((l,i)=>{
    if(l.startsWith('|')){iT=true;tR.push(l.split('|').filter(c=>c.trim()).map(c=>c.trim()));return;}
    if(iT)fl();
    if(l.startsWith('# '))es.push(<h1 key={i} className="text-xl font-bold text-slate-900 mt-4 mb-2">{l.slice(2)}</h1>);
    else if(l.startsWith('## '))es.push(<h2 key={i} className="text-lg font-bold text-slate-800 mt-3 mb-2">{l.slice(3)}</h2>);
    else if(l.startsWith('### '))es.push(<h3 key={i} className="text-base font-bold text-slate-700 mt-2 mb-1">{l.slice(4)}</h3>);
    else if(l.startsWith('- **')){const m=l.match(/^- \*\*(.+?)\*\*[：:](.*)$/);if(m)es.push(<p key={i} className="ml-4 my-1 text-sm"><b className="text-slate-700">{m[1]}：</b><span className="text-slate-600">{m[2].trim()}</span></p>);else es.push(<p key={i} className="ml-4 my-1 text-sm text-slate-600">{l.slice(2)}</p>);}
    else if(/^\d+\.\s/.test(l))es.push(<p key={i} className="ml-4 my-1 text-sm text-slate-600">{l}</p>);
    else if(l.startsWith('- '))es.push(<p key={i} className="ml-4 my-1 text-sm text-slate-600">• {l.slice(2)}</p>);
    else if(l.trim()){const r=l.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');es.push(<p key={i} className="my-1 text-sm text-slate-600" dangerouslySetInnerHTML={{__html:r}}/>);}
  });if(iT)fl();return es;
};

/* == Timer == */
const useTimer=(dur=25*60)=>{const[el,sE]=useState(0),[run,sR]=useState(false),ref=useRef(null);useEffect(()=>{if(run)ref.current=setInterval(()=>sE(e=>e+1),1000);else clearInterval(ref.current);return()=>clearInterval(ref.current);},[run]);const f=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;return{elapsed:el,running:run,setRunning:sR,display:f(el),total:f(dur)};};

/* == Sub-components == */
const ContraPanel=({sel,onTog})=>(<div className="flex flex-col gap-3">
  <div className="flex items-center gap-1.5"><AltI size={16} className="text-amber-500"/><span className="text-sm font-bold text-slate-700">禁忌症筛查</span>{sel.size>0&&<span className="text-xs bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded-full font-medium">已选{sel.size}</span>}</div>
  <div className="rounded-xl border border-slate-200 p-3 space-y-3">{Object.entries(CI).map(([cat,items])=>(<div key={cat}><span className="text-xs font-medium text-slate-400 mb-1 block">{cat}</span><div className="grid grid-cols-3 gap-2">{items.map(it=>{const on=sel.has(it.c);return(<label key={it.c} className="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" checked={on} onChange={()=>onTog(it.c)} className="w-3.5 h-3.5 rounded border-slate-300 text-amber-600"/><span className={`text-xs ${on?'text-amber-700 font-medium':'text-slate-600'}`}>{it.n}</span></label>);})}</div></div>))}</div>
  {sel.size>0&&<div className="bg-amber-50 border border-amber-200 rounded-lg p-2 flex items-start gap-2"><ShdI size={14} className="text-amber-600 mt-0.5 shrink-0"/><span className="text-xs text-amber-700">已标记{sel.size}项禁忌症，AI将自动排除相关方案</span></div>}
</div>);

const ScalePanel=({results,onSub})=>{
  const[sid,setSid]=useState("");const[ans,setAns]=useState({});const[done,setDone]=useState(null);
  const tpl=SC.find(s=>s.id===sid);
  const tot=tpl?tpl.qs.reduce((s,q)=>{const a=ans[q.id];return a!==undefined?s+(q.o[a]?.s||0):s;},0):0;
  const ok=tpl?tpl.qs.every(q=>ans[q.id]!==undefined):false;
  const sub=()=>{if(!tpl||!ok)return;const r={nm:tpl.nm,sc:tot,mx:tpl.qs.length*3};setDone(r);onSub(r);};
  const rst=()=>{setDone(null);setSid("");setAns({});};
  return(<div className="flex flex-col gap-3">
    <div className="flex items-center gap-1.5"><LstI size={16} className="text-indigo-500"/><span className="text-sm font-bold text-slate-700">量表评估</span></div>
    {done?(<div className="flex items-center justify-between rounded-lg bg-green-50 border border-green-200 p-3"><div className="flex items-center gap-2 text-sm text-green-700"><ChkI size={16}/><span>{done.nm} 已提交（总分：<b>{done.sc}</b>/{done.mx}）</span></div><button onClick={rst} className="text-xs bg-white border border-green-300 text-green-700 px-2 py-1 rounded hover:bg-green-100">重新评估</button></div>):(
    <><select value={sid} onChange={e=>{setSid(e.target.value);setAns({});}} className="w-full rounded-lg border border-slate-300 bg-slate-50 p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"><option value="">请选择量表模板</option>{SC.map(s=><option key={s.id} value={s.id}>{s.nm}</option>)}</select>
    {tpl&&<div className="flex flex-col gap-2"><p className="text-xs text-slate-500">{tpl.ds}</p><div className="rounded-xl border border-slate-200 divide-y divide-slate-100">{tpl.qs.map((q,qi)=>(<div key={q.id} className="p-3"><p className="text-sm font-medium text-slate-700 mb-2">{qi+1}. {q.t} <span className="text-red-400">*</span></p><div className="flex flex-col gap-1.5">{q.o.map((op,oi)=>(<label key={oi} className="flex items-center gap-2 cursor-pointer"><input type="radio" name={q.id} checked={ans[q.id]===oi} onChange={()=>setAns(p=>({...p,[q.id]:oi}))} className="w-3.5 h-3.5 text-indigo-600"/><span className="text-xs text-slate-600">{op.l} ({op.s}分)</span></label>))}</div></div>))}</div><div className="flex items-center justify-between"><span className="text-sm text-slate-600">当前总分：<b className="text-indigo-600">{tot}</b></span><button onClick={sub} disabled={!ok} className={`text-sm px-4 py-2 rounded-lg font-medium ${ok?'bg-indigo-600 text-white hover:bg-indigo-700':'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>提交量表</button></div></div>}</>)}
    {results.length>0&&!done&&<div className="space-y-1"><span className="text-xs text-slate-400">已完成：</span>{results.map((r,i)=>(<div key={i} className="flex items-center justify-between bg-slate-50 rounded-lg p-2 text-xs"><span className="text-slate-600">{r.nm}</span><span className="font-medium text-indigo-600">{r.sc}/{r.mx}</span></div>))}</div>}
  </div>);
};

/* == Treatment Warning == */
const WarnPanel=({onStop})=>(<div className="bg-amber-50 border border-amber-300 rounded-xl p-4">
  <div className="flex items-center gap-2 mb-2"><AltI size={16} className="text-amber-600"/><span className="text-sm font-bold text-amber-700">出现以下症状时需立即停止治疗</span></div>
  <ul className="space-y-1 mb-3">{WARNS.map(w=>(<li key={w} className="text-xs text-amber-600 flex items-start gap-1"><span className="shrink-0">•</span><span>{w}</span></li>))}</ul>
  <button onClick={onStop} className="w-full bg-red-600 hover:bg-red-700 text-white p-2.5 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-colors"><StpI size={16}/> 紧急停止并生成不良事件报告</button>
</div>);

/* == Prescription Selector (Stage 2) == */
const RxSelector=({ciSel,selected,onSelect})=>{
  const[filter,setFilter]=useState("全部");
  const regions=["全部","睡眠区","情志区","运动疗愈区"];
  const filtered=PJ.filter(p=>filter==="全部"||p.rg===filter);
  const hasCI=(p)=>p.ci.some(c=>ciSel.has(c));
  const selIds=new Set(selected.map(p=>p.id));
  const toggle=(p)=>{
    if(selIds.has(p.id)) onSelect(selected.filter(x=>x.id!==p.id));
    else{
      // 同区域只能选1个

  </div>);
};
